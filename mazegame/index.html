<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ LABYRIA ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    color: #eee;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 18px 0 10px;
    user-select: none;
  }
  #title {
    font-size: 2rem;
    letter-spacing: 0.2em;
    margin-bottom: 2px;
    text-shadow: 0 0 18px currentColor;
    transition: color 0.8s;
  }
  #subtitle {
    font-size: 0.9rem;
    letter-spacing: 0.35em;
    opacity: 0.7;
    margin-bottom: 10px;
    transition: color 0.8s;
  }
  #canvas-wrap {
    position: relative;
    display: inline-block;
    border-radius: 6px;
    padding: 4px;
    background: linear-gradient(90deg,#3fa,#38f,#f3a,#fa3,#3fa);
    background-size: 300% 100%;
    animation: bordermove 4s linear infinite;
    box-shadow: 0 0 30px rgba(100,200,255,0.3);
    transition: box-shadow 0.8s;
  }
  @keyframes bordermove {
    0%   { background-position: 0% 0%; }
    100% { background-position: 300% 0%; }
  }
  canvas {
    display: block;
    border-radius: 3px;
  }
  #hud {
    margin-top: 8px;
    display: flex;
    gap: 28px;
    font-size: 1rem;
    letter-spacing: 0.12em;
    opacity: 0.9;
  }
  #hud span { transition: color 0.8s; }
  #msg {
    margin-top: 8px;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    min-height: 1.4em;
    text-align: center;
    transition: color 0.8s;
  }
  #footer {
    margin-top: 10px;
    font-size: 0.7rem;
    opacity: 0.35;
    letter-spacing: 0.1em;
  }
  .blink { animation: blinkanim 1.1s step-end infinite; }
  @keyframes blinkanim { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="title">✦ LABYRIA ✦</div>
<div id="subtitle">FOREST</div>
<div id="canvas-wrap">
  <canvas id="c" width="600" height="600"></canvas>
</div>
<div id="hud">
  <span id="hud-level">LEVEL: 1</span>
  <span id="hud-theme">🌿 FOREST</span>
  <span id="hud-time">TIME: 0:00</span>
</div>
<div id="msg" class="blink">PRESS SPACE TO START 🎮</div>
<div id="footer">© 2026 Edeny / EdenCode - LABYRIA</div>

<script>
// ============================================================
//  LABYRIA — EdenCode Arcade
//  Single-file HTML5 canvas maze game
// ============================================================

'use strict';

// ── CONSTANTS ────────────────────────────────────────────────
const W = 600, H = 600; // canvas size (fixed)
let COLS = 15, ROWS = 15, CELL = 40; // updated per level
const WN = 1, WS = 2, WE = 4, WW = 8;

// Maze size grows with level 🗺️ (たくさん5×5でサクサク感！)
function getMazeSize(lv) {
  if (lv <= 6)  return 5;   // Lv.1-6  : 5×5  ← サクサク期
  if (lv <= 13) return 7;   // Lv.7-13 : 7×7
  if (lv <= 21) return 9;   // Lv.14-21: 9×9
  if (lv <= 29) return 11;  // Lv.22-29: 11×11
  if (lv <= 37) return 13;  // Lv.30-37: 13×13
  return 15;                // Lv.38+  : 15×15 フル
}
const DR = [[-1,0,WN,WS],[1,0,WS,WN],[0,1,WE,WW],[0,-1,WW,WE]]; // [dr,dc,wallFrom,wallTo]

// ── THEMES ───────────────────────────────────────────────────
const THEMES = [
  { // 0 FOREST
    name:'🌿 FOREST', label:'FOREST',
    bg:'#0d1a0d', wallColor:'#2d6a2d', wallGlow:'#5aff5a',
    floor1:'#111a11', floor2:'#142214',
    playerColor:'#a0ff80', hudColor:'#7fff00',
    particleColor:'#3ddc3d', borderColor:'#3fa',
    accent:'#5aff5a', titleColor:'#7fff00',
    hat:'leaf',
  },
  { // 1 OCEAN
    name:'💧 OCEAN', label:'OCEAN',
    bg:'#080f1e', wallColor:'#1a3a6e', wallGlow:'#40a0ff',
    floor1:'#0a1020', floor2:'#0c1828',
    playerColor:'#60d0ff', hudColor:'#40a0ff',
    particleColor:'#60d0ff', borderColor:'#38f',
    accent:'#40a0ff', titleColor:'#60d0ff',
    hat:'bubble',
  },
  { // 2 CAVE
    name:'🪨 CAVE', label:'CAVE',
    bg:'#111112', wallColor:'#4a4a4a', wallGlow:'#888888',
    floor1:'#141414', floor2:'#181818',
    playerColor:'#d0c090', hudColor:'#aaaaaa',
    particleColor:'#888888', borderColor:'#888',
    accent:'#cccc88', titleColor:'#cccc88',
    hat:'helmet',
  },
  { // 3 MAGMA
    name:'🌋 MAGMA', label:'MAGMA',
    bg:'#150500', wallColor:'#7a1800', wallGlow:'#ff5500',
    floor1:'#1a0800', floor2:'#200a00',
    playerColor:'#ffaa40', hudColor:'#ff6600',
    particleColor:'#ff8800', borderColor:'#f83',
    accent:'#ff5500', titleColor:'#ff8800',
    hat:'fire',
  },
  { // 4 SPACE
    name:'🌌 SPACE', label:'SPACE',
    bg:'#050510', wallColor:'#2a1a4a', wallGlow:'#9966ff',
    floor1:'#060612', floor2:'#080820',
    playerColor:'#ccaaff', hudColor:'#aa88ff',
    particleColor:'#8866ff', borderColor:'#96f',
    accent:'#9966ff', titleColor:'#ccaaff',
    hat:'astronaut',
  },
];

function getTheme(level) { return THEMES[Math.floor((level-1)/5) % THEMES.length]; }

// ── STATE ─────────────────────────────────────────────────────
let state = 'title'; // title | playing | clear | dead
let level = 1;
let walls = [];      // [row][col] bitmask
let rocks = new Set(); // "r,c" strings
let iceFloors = new Set(); // "r,c" strings — ice tiles (slide until wall)
let hasKey = false, keyPos = null, doorPos = null, doorOpen = false;
let warps = {};      // "r,c" -> {label, pair, partner:"r,c"}
let player = { r:0, c:0, x:0, y:0, tx:0, ty:0, moving:false, t:0,
               bounce:0, bounceT:0, iceDir:null, lastMoveDir:null, moveDur:120 };
let levelStartTime = 0, elapsed = 0;
let particles = [];
let burstQ = [];
let theme = THEMES[0];
let msgText = 'PRESS SPACE TO START 🎮';
let msgBlink = true;
let clearTimer = 0;
let keys = {};
let gamepadState = { axes:[0,0], buttons:[] };
let prevGPButtons = [];
let audioCtx = null;
let animId = null;
let lastTime = 0;

// ── CANVAS ───────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const titleEl = document.getElementById('title');
const subtitleEl = document.getElementById('subtitle');
const hudLevel = document.getElementById('hud-level');
const hudTheme = document.getElementById('hud-theme');
const hudTime = document.getElementById('hud-time');
const msgEl = document.getElementById('msg');
const wrap = document.getElementById('canvas-wrap');

// ── AUDIO ─────────────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function tone(freq, type, t, dur, vol=0.25, endFreq=null) {
  if (!audioCtx) return;
  const g = audioCtx.createGain();
  const o = audioCtx.createOscillator();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  if (endFreq !== null) o.frequency.linearRampToValueAtTime(endFreq, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}

function sfxMove() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  tone(220, 'sine', t, 0.06, 0.08);
}
function sfxClear() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  tone(440,'square',t,0.1,0.2);
  tone(550,'square',t+0.1,0.1,0.2);
  tone(660,'square',t+0.2,0.12,0.2);
  tone(880,'square',t+0.32,0.25,0.2);
}
function sfxStart() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  tone(330,'sine',t,0.1,0.2);
  tone(440,'sine',t+0.1,0.1,0.2);
  tone(550,'sine',t+0.2,0.15,0.2);
}
function sfxWarp() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  tone(880,'sawtooth',t,0.08,0.15,220);
  tone(440,'sine',t+0.1,0.15,0.15,880);
}
function sfxKey() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  tone(660,'sine',t,0.08,0.2);
  tone(880,'sine',t+0.08,0.12,0.2);
}
function sfxIce() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  tone(1200,'sine',t,0.08,0.12,800);
}
function sfxDoor() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  tone(300,'square',t,0.1,0.2,150);
  tone(400,'sine',t+0.1,0.15,0.2);
}
function sfxTheme() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [440,550,660,880,1100].forEach((f,i)=>{
    tone(f,'sine',t+i*0.1,0.15,0.2);
  });
}

// ── MAZE GENERATION (iterative DFS) ──────────────────────────
function generateMaze() {
  walls = Array.from({length:ROWS}, ()=>new Array(COLS).fill(0));
  const visited = Array.from({length:ROWS}, ()=>new Array(COLS).fill(false));
  const stack = [[0,0]];
  visited[0][0] = true;
  while (stack.length) {
    const [r,c] = stack[stack.length-1];
    // Shuffle neighbors
    const dirs = DR.slice().sort(()=>Math.random()-0.5);
    let moved = false;
    for (const [dr,dc,wf,wt] of dirs) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!visited[nr][nc]) {
        walls[r][c] |= wf;
        walls[nr][nc] |= wt;
        visited[nr][nc] = true;
        stack.push([nr,nc]);
        moved = true;
        break;
      }
    }
    if (!moved) stack.pop();
  }
}

// ── FLOOD-FILL REACHABILITY ───────────────────────────────────
function isReachable(blockedSet, sr, sc, er, ec, wallMap) {
  if (blockedSet.has(`${sr},${sc}`) || blockedSet.has(`${er},${ec}`)) return false;
  const visited = new Set();
  const queue = [`${sr},${sc}`];
  visited.add(`${sr},${sc}`);
  const dirs2 = [[-1,0,WN],[1,0,WS],[0,1,WE],[0,-1,WW]];
  while (queue.length) {
    const key = queue.shift();
    if (key === `${er},${ec}`) return true;
    const [r,c] = key.split(',').map(Number);
    for (const [dr,dc,wBit] of dirs2) {
      const nr=r+dr, nc=c+dc;
      const nk=`${nr},${nc}`;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      if (visited.has(nk)) continue;
      if (blockedSet.has(nk)) continue;
      if (!(wallMap[r][c] & wBit)) continue; // wall blocks
      visited.add(nk);
      queue.push(nk);
    }
  }
  return false;
}

// ── LEVEL SETUP ───────────────────────────────────────────────
function setupLevel(lv) {
  level = lv;
  theme = getTheme(lv);
  COLS = ROWS = getMazeSize(lv);
  CELL = W / COLS;
  generateMaze();
  rocks.clear();
  iceFloors.clear();
  hasKey = false; keyPos = null; doorPos = null; doorOpen = false;
  warps = {};

  // Rocks (Lv1+)
  const rockCount = Math.min(2 + Math.floor(lv/2), 18);
  let placed = 0, tries = 0;
  while (placed < rockCount && tries < 500) {
    tries++;
    const r = Math.floor(Math.random()*ROWS);
    const c = Math.floor(Math.random()*COLS);
    if ((r===0&&c===0)||(r===ROWS-1&&c===COLS-1)) continue;
    const k = `${r},${c}`;
    if (rocks.has(k)) continue;
    const testRocks = new Set(rocks);
    testRocks.add(k);
    if (isReachable(testRocks,0,0,ROWS-1,COLS-1,walls)) {
      rocks.add(k);
      placed++;
    }
  }

  // Ice floors (Lv7+) — 一本道（直線通路）にのみ配置 ❄️
  iceFloors.clear();
  if (lv >= 7) {
    const iceCount = Math.min(2 + Math.floor((lv-7)/2), 12);
    // 直線通路 = N-S のみ開通 or E-W のみ開通
    const corridors = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if ((r===0&&c===0)||(r===ROWS-1&&c===COLS-1)) continue;
        const w = walls[r][c];
        const isNS = (w & WN) && (w & WS) && !(w & WE) && !(w & WW);
        const isEW = (w & WE) && (w & WW) && !(w & WN) && !(w & WS);
        if ((isNS || isEW) && !rocks.has(`${r},${c}`)) corridors.push(`${r},${c}`);
      }
    }
    shuffle(corridors);
    for (let i = 0; i < iceCount && i < corridors.length; i++) {
      iceFloors.add(corridors[i]);
    }
  }

  // Key + Door (Lv11+)
  if (lv >= 11) {
    const candidates = [];
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      const k=`${r},${c}`;
      if ((r===0&&c===0)||(r===ROWS-1&&c===COLS-1)) continue;
      if (!rocks.has(k) && !iceFloors.has(k)) candidates.push([r,c]);
    }
    shuffle(candidates);
    // Key somewhere reachable
    for (const [kr,kc] of candidates) {
      const k=`${kr},${kc}`;
      keyPos = {r:kr,c:kc};
      // 扉の配置: スタート→鍵のルートを塞がないこと、かつ鍵→ゴールを塞ぐことが理想 🔒
      for (const [dr2,dc2] of candidates) {
        if (dr2===kr&&dc2===kc) continue;
        const dk=`${dr2},${dc2}`;
        const testBlock = new Set(rocks);
        testBlock.add(dk);
        // 扉があってもスタート→鍵に到達できること（鍵への道は絶対に塞がない）
        if (isReachable(testBlock,0,0,kr,kc,walls)) {
          doorPos = {r:dr2,c:dc2};
          break;
        }
      }
      if (doorPos) break;
    }
    doorOpen = false;
    hasKey = false;
  }

  // Warps (Lv16+)
  if (lv >= 16) {
    const pairCount = Math.min(1+Math.floor((lv-16)/4), 3);
    const labels = 'ABCDEFGHIJ';
    let li = 0;
    const wcands = [];
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      const k=`${r},${c}`;
      if ((r===0&&c===0)||(r===ROWS-1&&c===COLS-1)) continue;
      if (rocks.has(k) || iceFloors.has(k)) continue;
      if (keyPos&&keyPos.r===r&&keyPos.c===c) continue;
      if (doorPos&&doorPos.r===r&&doorPos.c===c) continue;
      wcands.push(k);
    }
    shuffle(wcands);
    for (let p=0;p<pairCount&&li+1<labels.length&&wcands.length>=2;p++) {
      // 両方のワープセルがスタートから到達可能なものだけ使う 🌀
      let placed = false;
      for (let ai=0; ai<wcands.length && !placed; ai++) {
        for (let bi=ai+1; bi<wcands.length && !placed; bi++) {
          const ka = wcands[ai], kb = wcands[bi];
          const [ar,ac] = ka.split(',').map(Number);
          const [br,bc] = kb.split(',').map(Number);
          if (isReachable(rocks,0,0,ar,ac,walls) && isReachable(rocks,0,0,br,bc,walls)) {
            const la = labels[li], lb = labels[li+1]; li+=2;
            warps[ka] = {label:`warp_${la}`, pair:p, partner:kb};
            warps[kb] = {label:`warp_${lb}`, pair:p, partner:ka};
            wcands.splice(bi,1); wcands.splice(ai,1);
            placed = true;
          }
        }
      }
    }
  }

  // Player start
  player.r = 0; player.c = 0;
  player.x = cellX(0); player.y = cellY(0);
  player.tx = player.x; player.ty = player.y;
  player.moving = false; player.t = 0;
  player.bounce = 0; player.bounceT = 0;
  player.iceDir = null; player.lastMoveDir = null; player.moveDur = 120;

  // Particles
  initParticles();

  // HUD
  updateHUD();
  levelStartTime = performance.now();

  // UI color
  applyThemeUI();
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function cellX(c) { return c*CELL + CELL/2; }
function cellY(r) { return r*CELL + CELL/2; }

// ── PARTICLES ─────────────────────────────────────────────────
function initParticles() {
  particles = [];
  const t = theme;
  if (t.hat==='leaf') {
    // Forest: falling leaves
    for (let i=0;i<30;i++) spawnLeaf();
  } else if (t.hat==='bubble') {
    // Ocean: rising bubbles
    for (let i=0;i<25;i++) spawnBubble(true);
  } else if (t.hat==='helmet') {
    // Cave: falling dust
    for (let i=0;i<35;i++) spawnDust(true);
  } else if (t.hat==='fire') {
    // Magma: rising embers
    for (let i=0;i<30;i++) spawnEmber(true);
  } else {
    // Space: twinkling stars
    for (let i=0;i<40;i++) spawnStar(true);
  }
}

function spawnLeaf(fromTop=false) {
  return particles.push({
    type:'leaf',
    x: Math.random()*W,
    y: fromTop ? -10 : Math.random()*H,
    vy: 0.4+Math.random()*0.6,
    vx: (Math.random()-0.5)*0.3,
    phase: Math.random()*Math.PI*2,
    size: 5+Math.random()*5,
    alpha: 0.5+Math.random()*0.5,
    rot: Math.random()*Math.PI*2,
    color: ['#3a8','#5b4','#2c6','#7d3'][Math.floor(Math.random()*4)],
  });
}
function spawnBubble(rand=false) {
  return particles.push({
    type:'bubble',
    x: Math.random()*W,
    y: rand ? Math.random()*H : H+10,
    vy: -(0.3+Math.random()*0.5),
    r: 3+Math.random()*8,
    alpha: 0.3+Math.random()*0.5,
    color:'#60d0ff',
  });
}
function spawnDust(rand=false) {
  return particles.push({
    type:'dust',
    x: Math.random()*W,
    y: rand ? Math.random()*H : -5,
    vy: 0.3+Math.random()*0.4,
    vx: (Math.random()-0.5)*0.2,
    size: 1+Math.random()*2.5,
    alpha: 0.2+Math.random()*0.4,
    color:'#888',
  });
}
function spawnEmber(rand=false) {
  return particles.push({
    type:'ember',
    x: Math.random()*W,
    y: rand ? Math.random()*H : H+5,
    vy: -(0.5+Math.random()*0.8),
    vx: (Math.random()-0.5)*0.4,
    size: 1.5+Math.random()*2.5,
    alpha: 0.7+Math.random()*0.3,
    color: Math.random()<0.5?'#ff8800':'#ffcc00',
    life: 1,
  });
}
function spawnStar(rand=false) {
  return particles.push({
    type:'star',
    x: Math.random()*W,
    y: rand ? Math.random()*H : Math.random()*H,
    size: 1+Math.random()*2.5,
    phase: Math.random()*Math.PI*2,
    speed: 0.02+Math.random()*0.04,
    color: ['#ccaaff','#8866ff','#ffffff','#dd99ff'][Math.floor(Math.random()*4)],
  });
}

function addBurst(x, y, color, count=16) {
  for (let i=0;i<count;i++) {
    const a = (Math.PI*2*i)/count + Math.random()*0.3;
    const spd = 1.5+Math.random()*2.5;
    particles.push({
      type:'burst',
      x, y,
      vx: Math.cos(a)*spd,
      vy: Math.sin(a)*spd,
      size: 3+Math.random()*3,
      alpha: 1,
      color,
      life: 1,
    });
  }
}

function updateParticles(dt) {
  const t = theme;
  for (let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    if (p.type==='leaf') {
      p.y += p.vy; p.x += p.vx + Math.sin(p.phase)*0.3;
      p.phase += 0.03; p.rot += 0.03;
      if (p.y>H+20) { particles.splice(i,1); spawnLeaf(true); }
    } else if (p.type==='bubble') {
      p.y += p.vy;
      if (p.y<-20) { particles.splice(i,1); spawnBubble(false); }
    } else if (p.type==='dust') {
      p.y += p.vy; p.x += p.vx;
      if (p.y>H+10) { particles.splice(i,1); spawnDust(false); }
    } else if (p.type==='ember') {
      p.y += p.vy; p.x += p.vx;
      p.life -= 0.008;
      if (p.y<-10||p.life<=0) { particles.splice(i,1); spawnEmber(false); }
    } else if (p.type==='star') {
      p.phase += p.speed;
    } else if (p.type==='burst') {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.08;
      p.life -= 0.025;
      p.alpha = p.life;
      if (p.life<=0) { particles.splice(i,1); }
    }
  }
}

// 雰囲気パーティクル（壁の後ろ）
function drawAmbientParticles() {
  ctx.save();
  for (const p of particles) {
    if (p.type === 'burst') continue; // burst は前面で描く
    ctx.globalAlpha = p.alpha !== undefined ? p.alpha : 0.6;
    ctx.fillStyle = p.color;
    ctx.strokeStyle = p.color;
    if (p.type==='leaf') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0,0,p.size,p.size*0.5,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (p.type==='bubble') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.lineWidth = 1.2;
      ctx.stroke();
    } else if (p.type==='dust'||p.type==='ember') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    } else if (p.type==='star') {
      const a = (Math.sin(p.phase)+1)/2;
      ctx.globalAlpha = a*0.8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// 花火パーティクル（全部の上）🎆
function drawBurstParticles() {
  ctx.save();
  for (const p of particles) {
    if (p.type !== 'burst') continue;
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.size * 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles() {
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = p.alpha !== undefined ? p.alpha : 0.6;
    ctx.fillStyle = p.color;
    ctx.strokeStyle = p.color;
    if (p.type==='burst') {
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── DRAWING ───────────────────────────────────────────────────
function drawFloor() {
  const t = theme;
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const k = `${r},${c}`;
      ctx.fillStyle = (r+c)%2===0 ? t.floor1 : t.floor2;
      ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
    }
  }
}

function drawWalls() {
  const t = theme;
  ctx.strokeStyle = t.wallColor;
  ctx.lineWidth = Math.max(2, CELL * 0.08);
  ctx.shadowColor = t.wallGlow;
  ctx.shadowBlur = CELL * 0.2;
  ctx.lineCap = 'round';

  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const x = c*CELL, y = r*CELL;
      const w = walls[r][c];
      // Draw missing walls (i.e., cells that DON'T have a passage)
      // Top wall
      if (!(w & WN)) {
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+CELL,y); ctx.stroke();
      }
      // Bottom wall
      if (!(w & WS)) {
        ctx.beginPath(); ctx.moveTo(x,y+CELL); ctx.lineTo(x+CELL,y+CELL); ctx.stroke();
      }
      // Right wall
      if (!(w & WE)) {
        ctx.beginPath(); ctx.moveTo(x+CELL,y); ctx.lineTo(x+CELL,y+CELL); ctx.stroke();
      }
      // Left wall
      if (!(w & WW)) {
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+CELL); ctx.stroke();
      }
    }
  }
  ctx.shadowBlur = 0;
}

function drawObstacles(now) {
  ctx.font = `${CELL*0.65}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Ice floors — shiny blue overlay + ❄️
  for (const k of iceFloors) {
    const [r,c] = k.split(',').map(Number);
    const x = c*CELL, y = r*CELL;
    // Pale blue overlay
    ctx.fillStyle = 'rgba(140,220,255,0.18)';
    ctx.fillRect(x, y, CELL, CELL);
    // Shine edge
    ctx.strokeStyle = 'rgba(180,240,255,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+2, y+2, CELL-4, CELL-4);
    // Snowflake
    ctx.font = `${CELL*0.45}px serif`;
    ctx.globalAlpha = 0.75 + 0.25*Math.sin(now*0.003 + r*c);
    ctx.fillText('❄️', x+CELL/2, y+CELL/2+1);
    ctx.globalAlpha = 1;
  }
  ctx.font = `${CELL*0.65}px serif`;

  // Rocks
  for (const k of rocks) {
    const [r,c] = k.split(',').map(Number);
    ctx.fillText('🪨', c*CELL+CELL/2, r*CELL+CELL/2+2);
  }

  // Key
  if (keyPos && !hasKey) {
    ctx.font = `${CELL*0.6}px serif`;
    ctx.fillText('🗝️', keyPos.c*CELL+CELL/2, keyPos.r*CELL+CELL/2+2);
  }

  // Door
  if (doorPos) {
    ctx.font = `${CELL*0.6}px serif`;
    ctx.fillText(doorOpen?'🔓':'🔒', doorPos.c*CELL+CELL/2, doorPos.r*CELL+CELL/2+2);
  }

  // Warps
  for (const [k,w] of Object.entries(warps)) {
    const [r,c] = k.split(',').map(Number);
    const pulse = 0.7+0.3*Math.sin(now*0.004+w.pair);
    ctx.globalAlpha = pulse;
    ctx.font = `${CELL*0.65}px serif`;
    ctx.fillText('🌀', c*CELL+CELL/2, r*CELL+CELL/2+2);
    ctx.globalAlpha = 1;
  }

  ctx.textAlign = 'left';
}

function drawMarkers(now) {
  const pulse = 0.7 + 0.3*Math.abs(Math.sin(now*0.002));
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // スタート 🚩 — ふわっと光る
  const emojiSize = Math.round(CELL * 0.65);
  ctx.font = `${emojiSize}px serif`;
  ctx.shadowColor = '#44ff88';
  ctx.shadowBlur = 14 * pulse;
  ctx.globalAlpha = 0.85 + 0.15 * pulse;
  ctx.fillText('🚩', CELL/2, CELL/2);

  // ゴール — 錠前あり:❓ / 開放済み:🏁
  const bx = (COLS-1)*CELL + CELL/2;
  const by = (ROWS-1)*CELL + CELL/2;
  if (doorPos && !doorOpen) {
    ctx.shadowColor = '#888888';
    ctx.shadowBlur = 8;
    ctx.globalAlpha = 0.7;
    ctx.fillText('❓', bx, by);
  } else {
    ctx.shadowColor = '#ffdd00';
    ctx.shadowBlur = 18 * pulse;
    ctx.globalAlpha = 0.85 + 0.15 * pulse;
    ctx.fillText('🏁', bx, by);
  }

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
}

function drawPlayer(now) {
  const t = theme;
  const px = player.x;
  const py = player.y + player.bounce;

  ctx.save();
  ctx.translate(px, py);

  // Body
  ctx.shadowColor = t.playerColor;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(0, 0, CELL*0.35, 0, Math.PI*2);
  ctx.fillStyle = t.playerColor;
  ctx.fill();

  // Eyes
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-5, -4, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -4, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-5, -3, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -3, 2, 0, Math.PI*2); ctx.fill();

  // Smile
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 2, 5, 0.2, Math.PI-0.2);
  ctx.stroke();

  // Hat / Accessory by theme
  drawHat(t.hat, now);

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawHat(hat, now) {
  if (hat==='leaf') {
    // Green leaf on top
    ctx.fillStyle = '#2a8';
    ctx.beginPath();
    ctx.ellipse(-4, -16, 8, 5, -0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#3d4';
    ctx.beginPath();
    ctx.ellipse(4, -18, 7, 4, 0.3, 0, Math.PI*2);
    ctx.fill();
  } else if (hat==='bubble') {
    // Bubble helmet outline
    ctx.strokeStyle = 'rgba(100,200,255,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -4, 16, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(100,200,255,0.2)';
    ctx.beginPath();
    ctx.arc(-5, -10, 4, 0, Math.PI*2);
    ctx.stroke();
  } else if (hat==='helmet') {
    // Miner helmet yellow
    ctx.fillStyle = '#f0b800';
    ctx.beginPath();
    ctx.ellipse(0, -13, 12, 7, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f0d000';
    ctx.fillRect(-12, -10, 24, 4);
    // Light
    ctx.fillStyle = '#ffffcc';
    ctx.shadowColor = '#ffffcc';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(0, -14, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  } else if (hat==='fire') {
    // Fire crown - 3 flames
    const flames = [[-8,0],[0,-4],[8,0]];
    const colors = ['#ff4400','#ff8800','#ffcc00'];
    for (let i=0;i<3;i++) {
      const [fx,fy] = flames[i];
      const fl = 5+2*Math.sin(now*0.01+i);
      ctx.fillStyle = colors[i%colors.length];
      ctx.beginPath();
      ctx.moveTo(fx, fy-16);
      ctx.quadraticCurveTo(fx-4, fy-16-fl, fx, fy-10-fl);
      ctx.quadraticCurveTo(fx+4, fy-16-fl, fx, fy-16);
      ctx.fill();
    }
  } else if (hat==='astronaut') {
    // Helmet ring glow
    ctx.strokeStyle = 'rgba(200,150,255,0.7)';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#cc88ff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.ellipse(0, -2, 18, 7, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ── INPUT ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (!e.repeat) onKeyPress(e.code);
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function onKeyPress(code) {
  initAudio();
  if (state==='title' || state==='clear') {
    if (code==='Space'||code==='Enter') startGame();
    return;
  }
  if (state==='playing') {
    // 最初の1押しは即時反応、ループが hold-to-move を担当
    const dirMap = { ArrowUp:0, KeyW:0, ArrowDown:1, KeyS:1, ArrowRight:2, KeyD:2, ArrowLeft:3, KeyA:3 };
    if (dirMap[code] !== undefined) tryMove(dirMap[code]);
  }
}

// ── GAMEPAD ───────────────────────────────────────────────────
function pollGamepad() {
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  gpHeldDir = null;
  for (const gp of gps) {
    if (!gp) continue;
    const ax = gp.axes[0]||0, ay = gp.axes[1]||0;
    const threshold = 0.4;
    // D-pad or left stick — held direction
    if      (gp.buttons[12]?.pressed || ay < -threshold) gpHeldDir = 0;
    else if (gp.buttons[13]?.pressed || ay >  threshold) gpHeldDir = 1;
    else if (gp.buttons[15]?.pressed || ax >  threshold) gpHeldDir = 2;
    else if (gp.buttons[14]?.pressed || ax < -threshold) gpHeldDir = 3;
    // A button (index 0) to start — edge detect
    const aPressed = gp.buttons[0]?.pressed || false;
    if (aPressed && !prevGPButtons[0]) {
      if (state==='title'||state==='clear') { initAudio(); startGame(); }
    }
    prevGPButtons = [aPressed];
    break;
  }
}

// ── MOVEMENT ─────────────────────────────────────────────────
function tryMove(dir) {
  if (player.moving) return;
  const [dr,dc,wBit] = [
    [-1,0,WN],[1,0,WS],[0,1,WE],[0,-1,WW]
  ][dir];
  const nr = player.r+dr, nc = player.c+dc;
  if (nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
  if (!(walls[player.r][player.c] & wBit)) return; // wall
  const nk = `${nr},${nc}`;
  // Rock
  if (rocks.has(nk)) return;
  // Door (closed and no key)
  if (doorPos && doorPos.r===nr && doorPos.c===nc && !doorOpen) return;

  // Move
  player.lastMoveDir = dir;
  player.moveDur = player.iceDir !== null ? 70 : 120; // faster when sliding on ice
  player.r = nr; player.c = nc;
  player.tx = cellX(nc); player.ty = cellY(nr);
  player.moving = true; player.t = 0;
  sfxMove();

  resolveCell();
}

function resolveCell() {
  const k = `${player.r},${player.c}`;

  // Key pickup → 錠前が即座に自動オープン！🗝️✨
  if (keyPos && keyPos.r===player.r && keyPos.c===player.c && !hasKey) {
    hasKey = true;
    sfxKey();
    addBurst(player.x, player.y, '#ffdd00', 16);
    // 鍵を拾った瞬間に扉が開く＆ゴール花火！🎆
    if (doorPos && !doorOpen) {
      doorOpen = true;
      setTimeout(() => sfxDoor(), 200);
      addBurst(cellX(doorPos.c), cellY(doorPos.r), theme.accent, 20);
      // ?→B の瞬間に花火 🎇
      const gx = cellX(COLS-1), gy = cellY(ROWS-1);
      addBurst(gx, gy, theme.accent, 30);
      setTimeout(() => addBurst(gx, gy, '#ffdd00', 20), 150);
      setTimeout(() => addBurst(gx, gy, theme.wallGlow, 20), 300);
    }
  }
  // Ice floor — keep sliding in same direction
  if (iceFloors.has(k)) {
    player.iceDir = player.lastMoveDir; // continue sliding
  } else {
    player.iceDir = null; // hit non-ice, stop
  }
  // Warp
  if (warps[k]) {
    const partner = warps[k].partner;
    const [pr,pc] = partner.split(',').map(Number);
    player.r = pr; player.c = pc;
    player.x = cellX(pc); player.y = cellY(pr);
    player.tx = player.x; player.ty = player.y;
    sfxWarp();
    addBurst(player.x, player.y, theme.accent, 14);
    player.pendingArrow = null;
    player.lastArrowCell = partner;
  }

  // Check exit — 錠前があれば鍵を開けるまでゴール無効 🔒
  if (player.r===ROWS-1 && player.c===COLS-1 && (!doorPos || doorOpen)) {
    onLevelClear();
  }
}

function onLevelClear() {
  state = 'clear';
  sfxClear();
  // 🎆 ゴール花火！3連発でド派手に
  const gx = cellX(COLS-1), gy = cellY(ROWS-1);
  addBurst(gx, gy, theme.accent,   32);
  setTimeout(()=>{ addBurst(gx, gy, '#ffdd00', 28); addBurst(W/2, H/2, theme.wallGlow, 20); }, 180);
  setTimeout(()=>{ addBurst(gx, gy, '#ffffff', 24); addBurst(W/3, H/3, theme.accent,   20); addBurst(W*2/3, H*2/3, '#ffdd00', 20); }, 360);
  clearTimer = performance.now();
  setMsg('🎉 LEVEL CLEAR! 🎉', false);
  // Check theme change
  const nextTheme = getTheme(level+1);
  if (nextTheme !== theme) {
    setTimeout(()=>sfxTheme(), 400);
  }
  setTimeout(()=>{
    setupLevel(level+1);
    state = 'playing';
    levelStartTime = performance.now();
    setMsg('', false);
    updateHUD();
  }, 2200);
}

// ── HUD & UI ─────────────────────────────────────────────────
function applyThemeUI() {
  const t = theme;
  titleEl.style.color = t.titleColor;
  subtitleEl.style.color = t.accent;
  subtitleEl.textContent = t.label;
  document.getElementById('hud-level').style.color = t.hudColor;
  document.getElementById('hud-theme').style.color = t.hudColor;
  document.getElementById('hud-time').style.color = t.hudColor;
  msgEl.style.color = t.accent;
  // Canvas border gradient matching theme
  wrap.style.background = `linear-gradient(90deg,${t.borderColor},${t.accent},${t.wallGlow},${t.borderColor})`;
  wrap.style.boxShadow = `0 0 30px ${t.accent}55`;
}

function updateHUD() {
  hudLevel.textContent = `LEVEL: ${level}`;
  hudTheme.textContent = `${theme.name}  ${COLS}×${ROWS}`;
}

function setMsg(txt, blink=true) {
  msgEl.textContent = txt;
  if (blink) msgEl.classList.add('blink');
  else msgEl.classList.remove('blink');
}

function fmtTime(ms) {
  const s = Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ── GAME START ────────────────────────────────────────────────
function startGame() {
  sfxStart();
  setupLevel(level);
  state = 'playing';
  levelStartTime = performance.now();
  setMsg('', false);
  updateHUD();
}

// ── INPUT HELPERS ─────────────────────────────────────────────
let gpHeldDir = null; // set by pollGamepad

function getHeldDir() {
  if (keys['ArrowUp']    || keys['KeyW']) return 0;
  if (keys['ArrowDown']  || keys['KeyS']) return 1;
  if (keys['ArrowRight'] || keys['KeyD']) return 2;
  if (keys['ArrowLeft']  || keys['KeyA']) return 3;
  if (gpHeldDir !== null) return gpHeldDir;
  return null;
}

// ── MAIN LOOP ─────────────────────────────────────────────────
function loop(now) {
  animId = requestAnimationFrame(loop);
  const dt = now - lastTime;
  lastTime = now;

  pollGamepad();

  // Movement tween
  if (player.moving) {
    const md = player.moveDur;
    player.t = Math.min(player.t + dt, md);
    const prog = player.t / md;
    const ease = prog < 0.5 ? 2*prog*prog : -1+(4-2*prog)*prog;
    player.x = lerp(player.x, player.tx, ease);
    player.y = lerp(player.y, player.ty, ease);
    if (player.t >= md) {
      player.x = player.tx; player.y = player.ty;
      player.moving = false;
      player.t = 0;
    }
  } else if (state === 'playing') {
    if (player.iceDir !== null) {
      // 🧊 Ice sliding — continue in same direction
      const oldR = player.r, oldC = player.c;
      tryMove(player.iceDir);
      if (player.r === oldR && player.c === oldC) {
        // Hit a wall — stop sliding
        player.iceDir = null;
      } else {
        sfxIce();
      }
    } else {
      // 🕹️ Hold-to-move — keep moving while key/stick is held
      const dir = getHeldDir();
      if (dir !== null) tryMove(dir);
    }
  }

  // Bounce
  player.bounceT += dt * 0.005;
  player.bounce = Math.sin(player.bounceT) * 2.5;

  // Timer
  if (state === 'playing') {
    elapsed = now - levelStartTime;
    hudTime.textContent = `TIME: ${fmtTime(elapsed)}`;
  }

  // Particles
  updateParticles(dt);

  // Draw
  draw(now);
}

function lerp(a, b, t) { return a + (b-a)*t; }

function draw(now) {
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0,0,W,H);

  // Floor
  drawFloor();

  // Ambient particles (behind walls)
  drawAmbientParticles();

  // Walls
  drawWalls();

  // Obstacles
  drawObstacles(now);

  // Markers
  drawMarkers(now);

  // Player (only in playing/clear)
  if (state==='playing'||state==='clear') {
    drawPlayer(now);
  }

  // Burst particles on TOP of everything 🎆
  drawBurstParticles();

  // Title screen overlay
  if (state==='title') {
    drawTitleOverlay(now);
  }
}

function drawTitleOverlay(now) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const pulse = 0.8+0.2*Math.sin(now*0.003);
  ctx.shadowColor = theme.accent;
  ctx.shadowBlur = 20*pulse;
  ctx.fillStyle = theme.titleColor;
  ctx.font = `bold 36px Share Tech Mono, monospace`;
  ctx.fillText('✦ LABYRIA ✦', W/2, H/2-40);

  ctx.font = `16px Share Tech Mono, monospace`;
  ctx.fillStyle = theme.accent;
  ctx.shadowBlur = 8;
  ctx.fillText('NAVIGATE FROM  🚩  TO  🏁', W/2, H/2+10);
  ctx.fillText('ARROW KEYS / WASD / D-PAD', W/2, H/2+38);
  ctx.fillText('GAMEPAD OK  🎮', W/2, H/2+62);

  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  theme = getTheme(1);
  applyThemeUI();
  generateMaze(); // dummy for title screen
  initParticles();
  setMsg('PRESS SPACE TO START 🎮', true);
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

init();
</script>
